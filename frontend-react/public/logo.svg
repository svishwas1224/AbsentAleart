<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <!-- Clock outer ring - blue top, gray bottom -->
  <circle cx="55" cy="62" r="46" stroke="url(#clockGrad)" stroke-width="7" fill="white"/>
  <!-- Clock tick marks -->
  <line x1="55" y1="20" x2="55" y2="28" stroke="#9ca3af" stroke-width="3" stroke-linecap="round"/>
  <line x1="55" y1="96" x2="55" y2="104" stroke="#9ca3af" stroke-width="3" stroke-linecap="round"/>
  <line x1="11" y1="62" x2="19" y2="62" stroke="#9ca3af" stroke-width="3" stroke-linecap="round"/>
  <line x1="91" y1="62" x2="99" y2="62" stroke="#9ca3af" stroke-width="3" stroke-linecap="round"/>
  <line x1="22" y1="31" x2="28" y2="37" stroke="#9ca3af" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="82" y1="87" x2="88" y2="93" stroke="#9ca3af" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="88" y1="31" x2="82" y2="37" stroke="#9ca3af" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="22" y1="93" x2="28" y2="87" stroke="#9ca3af" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Bell body - orange -->
  <path d="M38 75 C36 75 35 73 36 71 L40 58 C40 48 47 41 56 40 C65 41 72 48 72 58 L76 71 C77 73 76 75 74 75 Z" fill="#e85d04"/>
  <!-- Bell bottom curve -->
  <path d="M44 75 Q56 82 68 75" stroke="#e85d04" stroke-width="3" fill="none" stroke-linecap="round"/>
  <!-- Bell clapper dot -->
  <circle cx="56" cy="79" r="4" fill="#c44d00"/>
  <!-- Bell top knob -->
  <rect x="53" y="36" width="6" height="6" rx="3" fill="#e85d04"/>
  <!-- Bell shine -->
  <path d="M44 52 Q46 46 52 44" stroke="#f97316" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.6"/>

  <!-- Exclamation mark - orange, top right -->
  <rect x="80" y="28" width="12" height="28" rx="6" fill="#e85d04"/>
  <circle cx="86" cy="66" r="6" fill="#e85d04"/>

  <!-- Gradient definition -->
  <defs>
    <linearGradient id="clockGrad" x1="55" y1="16" x2="55" y2="108" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="55%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#6b7280"/>
    </linearGradient>
  </defs>
</svg>
